<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>Generate Eid Al-Adha Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        canvas {
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 24px;
            background: #743d3e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5a2f30;
        }
    </style>
</head>
<body>
    <h2>تصميم عيد الأضحى - Eid Al-Adha Design</h2>
    <canvas id="designCanvas" width="1080" height="1080"></canvas>
    <button onclick="downloadDesign()">تحميل التصميم</button>

    <script>
        const canvas = document.getElementById('designCanvas');
        const ctx = canvas.getContext('2d');

        function drawDesign() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background gradient (dark burgundy/maroon)
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#2d1a1a');
            gradient.addColorStop(0.5, '#4a2424');
            gradient.addColorStop(1, '#1a0f0f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw decorative pattern (subtle grid/lines)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw frame border
            ctx.strokeStyle = 'rgba(116, 61, 62, 0.8)';
            ctx.lineWidth = 4;
            ctx.strokeRect(30, 30, canvas.width - 60, canvas.height - 60);

            // Inner frame
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 2;
            ctx.strokeRect(50, 50, canvas.width - 100, canvas.height - 100);

            // Draw crescent moon symbol
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, 280, 80, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#2d1a1a';
            ctx.beginPath();
            ctx.arc(canvas.width / 2 + 20, 280, 70, 0, Math.PI * 2);
            ctx.fill();

            // Draw small stars
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            const stars = [
                {x: 200, y: 200, size: 3},
                {x: 880, y: 200, size: 3},
                {x: 150, y: 350, size: 2},
                {x: 930, y: 350, size: 2},
                {x: 180, y: 150, size: 2},
                {x: 900, y: 150, size: 2}
            ];
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw "EID AL-ADHA" text
            ctx.font = 'bold 80px Arial, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText('EID AL-ADHA', canvas.width / 2, 420);

            // Draw Arabic text
            ctx.font = 'bold 60px Arial, sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 5;
            ctx.fillText('عيد الأضحى المبارك', canvas.width / 2, 520);

            // Draw decorative line
            ctx.strokeStyle = 'rgba(116, 61, 62, 0.6)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 150, 580);
            ctx.lineTo(canvas.width / 2 + 150, 580);
            ctx.stroke();

            // Draw "Arabian Essar" text
            ctx.font = 'normal 30px Arial, sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 0;
            ctx.fillText('Arabian Essar', canvas.width / 2, 630);

            // Draw corner decorations
            ctx.strokeStyle = 'rgba(116, 61, 62, 0.5)';
            ctx.lineWidth = 2;
            
            // Top left corner
            ctx.beginPath();
            ctx.moveTo(80, 100);
            ctx.lineTo(80, 80);
            ctx.lineTo(100, 80);
            ctx.stroke();

            // Top right corner
            ctx.beginPath();
            ctx.moveTo(canvas.width - 80, 100);
            ctx.lineTo(canvas.width - 80, 80);
            ctx.lineTo(canvas.width - 100, 80);
            ctx.stroke();

            // Bottom left corner
            ctx.beginPath();
            ctx.moveTo(80, canvas.height - 100);
            ctx.lineTo(80, canvas.height - 80);
            ctx.lineTo(100, canvas.height - 80);
            ctx.stroke();

            // Bottom right corner
            ctx.beginPath();
            ctx.moveTo(canvas.width - 80, canvas.height - 100);
            ctx.lineTo(canvas.width - 80, canvas.height - 80);
            ctx.lineTo(canvas.width - 100, canvas.height - 80);
            ctx.stroke();
        }

        function downloadDesign() {
            const link = document.createElement('a');
            link.download = 'design.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Draw the design when page loads
        drawDesign();
    </script>
</body>
</html>
